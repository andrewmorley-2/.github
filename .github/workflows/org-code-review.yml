name: Automated Code Review
on:
  pull_request:
  workflow_call:

jobs:
  review:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: andrewmorley-2/foundry-automated-code-review@v1
        with:
          model: ${{ vars.PR_REVIEW_MODEL || 'gpt-4o-mini' }}
          foundry-endpoint: ${{ vars.FOUNDRY_INFERENCE_ENDPOINT }}
          block-on-critical: ${{ vars.BLOCK_ON_CRITICAL || 'false' }}
